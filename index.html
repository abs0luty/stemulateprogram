<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favlogo2.svg" />
    <link rel="preload" as="image" href="/logo.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no, shrink-to-fit=no, viewport-fit=cover"
    />
    <title>STEMulate Research Program</title>
    <meta
      name="description"
      content="Join STEMulate - a world-class research program, uniting students from over 20 countries, mentored by experts from top institutions like Stanford, Purdue, and UC Berkeley."
    />
    <meta name="robots" content="index, follow" />

    <style>
      html,
      body {
        height: 100%;
        width: 100%;
        overscroll-behavior: none;
      }

      @font-face {
        font-family: "Sohne";
        font-weight: 400;
        font-style: normal;
        src: url("/fonts/sohne-400-normal.woff") format("woff");
      }

      @font-face {
        font-family: "Sohne";
        font-weight: 700;
        font-style: normal;
        src: url("/fonts/sohne-700-normal.woff") format("woff");
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="/scripts/three.min.js"></script>
    <script>
      ;(function () {
        var minimumLoadingDuration = 1000
        var loadingStartedAt = Date.now()
        var progressValue = 0
        var progressTimer = null

        function setProgress(value) {
          var progressBar = document.getElementById("loadingProgressBar")
          var progressLabel = document.getElementById("loadingProgressLabel")
          progressValue = Math.max(progressValue, Math.min(100, value))

          if (progressBar) {
            progressBar.style.width = progressValue + "%"
          }

          if (progressLabel) {
            progressLabel.textContent = Math.round(progressValue) + "%"
          }
        }

        function startProgressSimulation() {
          function tick() {
            var elapsed = Date.now() - loadingStartedAt
            var nextValue = 20 + 75 * (1 - Math.exp(-elapsed / 1300))
            setProgress(Math.min(94, nextValue))
          }

          tick()
          progressTimer = window.setInterval(tick, 120)
        }

        function removeLoadingDiv() {
          var loadingDiv = document.getElementById("loadingDiv")

          if (!loadingDiv) {
            return
          }

          loadingDiv.style.transition = "opacity 0.5s ease-in-out"
          loadingDiv.style.opacity = 0
          loadingDiv.style.pointerEvents = "none"

          window.setTimeout(function () {
            if (loadingDiv.parentNode) {
              loadingDiv.parentNode.removeChild(loadingDiv)
            }
          }, 500)
        }

        function finishLoading() {
          var elapsed = Date.now() - loadingStartedAt
          var remaining = Math.max(0, minimumLoadingDuration - elapsed)

          window.setTimeout(function () {
            if (progressTimer) {
              window.clearInterval(progressTimer)
            }

            setProgress(100)
            window.requestAnimationFrame(function () {
              window.requestAnimationFrame(removeLoadingDiv)
            })
          }, remaining)
        }

        startProgressSimulation()

        if (document.readyState === "complete") {
          finishLoading()
        } else {
          window.addEventListener("load", finishLoading, { once: true })
        }
      })()
    </script>
    <div
      id="loadingDiv"
      class="bg-neutral-900"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 2em;
      "
    >
      <div class="loading-shell">
        <div class="loading-title">
          Loading
          <span class="dot">.</span>
          <span class="dot">.</span>
          <span class="dot">.</span>
        </div>
        <div class="loading-progress-track">
          <div id="loadingProgressBar" class="loading-progress-bar"></div>
        </div>
        <div id="loadingProgressLabel" class="loading-progress-label">0%</div>
      </div>
    </div>

    <style>
      .loading-shell {
        width: min(320px, calc(100vw - 48px));
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .loading-title {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .loading-progress-track {
        width: 100%;
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      }

      .loading-progress-bar {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #ef4444 0%, #f87171 100%);
        transition: width 0.18s ease-out;
      }

      .loading-progress-label {
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.72);
      }

      .dot {
        animation: dot-pulse 1.5s infinite;
      }

      .dot:nth-child(2) {
        animation-delay: 0.5s;
      }

      .dot:nth-child(3) {
        animation-delay: 1s;
      }

      @keyframes dot-pulse {
        0% {
          opacity: 0.2;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.2;
        }
      }
    </style>
  </body>
</html>
